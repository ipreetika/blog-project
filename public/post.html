<!DOCTYPE html>
<html>
<head>
  <title>Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f9fafb;
    }

    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    h1 {
      margin-top: 0;
    }

    .back {
      cursor: pointer;
      color: #2563eb;
      margin-bottom: 20px;
      display: inline-block;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin: 15px 0;
    }
  </style>
</head>

<body>

<header>📖 Blog Post</header>

<div class="container">
  <span class="back" onclick="goBack()">← Back</span>

  <h1 id="title"></h1>
  <p id="date" style="color:gray;font-size:12px;"></p>

  <img id="image" style="display:none;">

  <p id="content"></p>
</div>

<script>
const API = "https://blog-project-3uyk.onrender.com";

function getId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

function goBack() {
  window.location.href = "/";
}

// Load post
fetch(API + "/posts/" + getId())
  .then(res => res.json())
  .then(post => {
    document.getElementById("title").innerText = post.title;
    document.getElementById("content").innerText = post.content;

    // Date
    if (post.createdAt) {
      document.getElementById("date").innerText =
        new Date(post.createdAt).toLocaleDateString();
    }

    // Image
    if (post.image) {
      const img = document.getElementById("image");
      img.src = post.image;
      img.style.display = "block";
    }
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #333;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
    }

    .post-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .post-card:hover {
      transform: translateY(-3px);
    }

    .post-card h2 {
      margin: 0;
    }

    .post-card p {
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #1e40af;
    }

    .empty {
      text-align: center;
      color: #777;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<header>📝 My Blog</header>

<div class="container" id="posts"></div>

<script>
fetch("/posts")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    if (!data.length) {
      container.innerHTML = "<p class='empty'>No posts available</p>";
      return;
    }

    data.forEach(post => {
      const div = document.createElement("div");
      div.className = "post-card";

      div.innerHTML = `
        <h2>${post.title}</h2>

        <p style="font-size:12px;color:gray;">
          ${post.createdAt ? new Date(post.createdAt).toLocaleDateString() : ""}
        </p>

        ${post.image ? `
          <img src="${post.image}" 
               style="width:100%; border-radius:10px; margin:10px 0;">
        ` : ""}

        <p>${post.content.substring(0, 120)}...</p>

        <span class="btn" onclick="openPost('${post._id}')">Read More</span>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => {
    console.error(err);
    document.getElementById("posts").innerHTML = "<p>Error loading posts</p>";
  });

function openPost(id) {
  window.location.href = "/post.html?id=" + id;
}
</script>

<footer style="text-align:center; padding:20px; color:#777;">
  © 2026 My Blog | Built with ❤️ by preeti
</footer>

</body>
</html>

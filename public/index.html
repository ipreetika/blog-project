<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #333;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
    }

    .post-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1e40af;
    }
  </style>
</head>

<body>

<header>📝 My Blog</header>

<div class="container" id="posts"></div>

<script>
const API = "https://blog-project-3uyk.onrender.com";

// Load posts
fetch(API + "/posts")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      const div = document.createElement("div");
      div.className = "post-card";

      div.innerHTML = `
        <h2>${post.title}</h2>

        <p style="font-size:12px;color:gray;">
          ${post.createdAt ? new Date(post.createdAt).toLocaleDateString() : ""}
        </p>

        ${post.image ? `
          <img src="${post.image}" style="width:100%; border-radius:10px;">
        ` : ""}

        <p>${post.content.substring(0, 120)}...</p>

        <span class="btn" onclick="openPost('${post._id}')">Read More</span>

        <br><br>

        <button onclick="likePost('${post._id}')">
          👍 ${post.likes || 0}
        </button>

        <br><br>

        <input id="comment-${post._id}" placeholder="Write comment">
        <button onclick="addComment('${post._id}')">Comment</button>

        <div>
          ${(post.comments || []).map(c => `
            <p>💬 ${c.text}</p>
          `).join("")}
        </div>
      `;

      container.appendChild(div);
    });
  });

// Open post
function openPost(id) {
  window.location.href = "/post.html?id=" + id;
}

// Like
function likePost(id) {
  fetch(API + `/posts/${id}/like`, { method: "POST" })
    .then(() => location.reload());
}

// Comment
function addComment(id) {
  const input = document.getElementById(`comment-${id}`);
  const text = input.value;

  fetch(API + `/posts/${id}/comment`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  })
  .then(() => location.reload());
}
</script>

<footer style="text-align:center; padding:20px; color:#777;">
  © 2026 My Blog | Built with ❤️ by preeti
</footer>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
header {
  background: #111827;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 0 15px;
}

/* POST CARD */
.post-card {
  background: white;
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}

.post-card:hover {
  transform: translateY(-6px);
}
.post-card h2 {
  font-size: 24px;
  margin-bottom: 8px;
}

.post-card p {
  font-size: 15px;
  color: #4b5563;
}

/* IMAGE */
.post-card img {
  width: 100%;
  border-radius: 10px;
  margin: 10px 0;
}

/* TITLE */
.post-card h2 {
  margin: 0;
  color: #111827;
}

/* TEXT */
.post-card p {
  color: #374151;
  line-height: 1.6;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 10px 16px;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  border-radius: 8px;
  font-weight: 500;
  margin-top: 12px;
  cursor: pointer;
  border: none;
}

.btn:hover {
  opacity: 0.9;
}
button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: #f3f4f6;
  cursor: pointer;
}

button:hover {
  background: #e5e7eb;
}
input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  margin-right: 8px;
}
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #111827;
  color: white;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(to right, #2563eb, #1e3a8a);
  color: white;
}

.hero h1 {
  margin-bottom: 10px;
}

/* CONTAINER */
.container {
  padding: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
}

/* POST CARD */
.post-card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.post-card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.post-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* CONTENT */
.post-content {
  padding: 15px;
}

.post-content h2 {
  margin: 0;
  font-size: 20px;
}

.post-content p {
  color: gray;
  font-size: 14px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
  </style>
</head>

<body>
  <header class="navbar">
  <div class="logo">📝 MyBlog</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="#">Trending</a>
    <a href="#">About</a>
  </div>
</header>

<section class="hero">
  <h1>Explore the Future of Technology 🚀</h1>
  <p>Read amazing blogs on AI, Innovation, and Modern Tech</p>
</section>

<div class="container">
  <div id="posts" class="grid"></div>
</div>

<header>📝 My Blog</header>

<div class="container" id="posts"></div>

<script>
const API = "https://blog-project-3uyk.onrender.com";

// Load posts
fetch(API + "/posts")
.then(res => res.json())
 .then(data => {
  const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      const div = document.createElement("div");
      div.className = "post-card";

 div.innerHTML = `
  ${post.image ? `<img src="${post.image}">` : ""}

  <div class="post-content">
    <h2>${post.title}</h2>

    <p style="font-size:12px;color:gray;">
      ${post.createdAt ? new Date(post.createdAt).toDateString() : ""}
    </p>

    <p>${post.content.substring(0, 120)}...</p>

    <span class="btn" onclick="openPost('${post._id}')">
      Read More →
    </span>
  </div>
`;  

      container.appendChild(div);
    });
  });

// Open post
function openPost(id) {
  window.location.href = "/post.html?id=" + id;
}

// Like
function likePost(id) {
  fetch(API + `/posts/${id}/like`, { method: "POST" })
    .then(() => location.reload());
}

// Comment
function addComment(id) {
  const input = document.getElementById(`comment-${id}`);
  const text = input.value;

  fetch(API + `/posts/${id}/comment`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  })
  .then(() => location.reload());
}
</script>

<footer style="text-align:center;padding:20px;color:gray;">
  © 2026 My Blog | Built with ❤️ by preeti
</footer>

</body>
</html>

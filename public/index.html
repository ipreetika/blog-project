<!DOCTYPE html>
<html>
<head>
<head>
  <title>My Blog</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    .posts-container {
      max-width: 800px;
      margin: auto;
    }

    .post-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      margin-right: 10px;
      padding: 6px 12px;
    }
  </style>

</head>

<body>

<h1>My Blog</h1>
<h2>Create Post</h2>

<input type="text" id="title" placeholder="Enter title"><br><br>

<textarea id="content" placeholder="Enter content"></textarea><br><br>

<button onclick="createPost()">Submit</button>
<div id="posts" class="posts-container"></div>

<script>
  
fetch("/posts")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("posts");

    if (!data.length) {
      container.innerHTML = "<p>No posts found</p>";
      return;
    }

    container.innerHTML = "";

    data.forEach(post => {
      const div = document.createElement("div");
       div.className = "post-card";

div.innerHTML = `
  <h3>${post.title}</h3>
  <p>${post.content}</p>

  <button onclick="editPost('${post._id}')">Edit</button>
  <button onclick="deletePost('${post._id}')">Delete</button>

  <hr>
`;

      container.appendChild(div);
    });
  })
  .catch(err => console.log(err));

function deletePost(id) {
  const token = localStorage.getItem("token");

  fetch(`/posts/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": token
    }
  })
  .then(() => location.reload())
  .catch(err => console.log(err));
}

function editPost(id) {
  const token = localStorage.getItem("token");

  fetch(`/posts`)
    .then(res => res.json())
    .then(data => {
      const post = data.find(p => p._id === id);

      const newTitle = prompt("Edit title:", post.title);
      const newContent = prompt("Edit content:", post.content);

      if (!newTitle || !newContent) return;

      fetch(`/posts/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": token
        },
        body: JSON.stringify({
          title: newTitle,
          content: newContent
        })
      })
      .then(() => location.reload());
    });
}

  function createPost() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  console.log("Sending:", title, content); // debug

  fetch("/posts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, content })
  })
  .then(res => res.json())
  .then(data => {
    alert("Post created!");
    location.reload();
  })
  .catch(err => console.log(err));
}
</script>

</body>
</html>

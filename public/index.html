<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
header {
  background: #111827;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 0 15px;
}

/* POST CARD */
.post-card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
  cursor: pointer;
}

.post-card:hover {
  transform: translateY(-8px) scale(1.01);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}
.post-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.post-card:hover img {
  transform: scale(1.05);
}

/* IMAGE */
.post-card img {
  width: 100%;
  border-radius: 10px;
  margin: 10px 0;
}

/* TITLE */
.post-card h2 {
  margin: 0;
  color: #111827;
}

/* TEXT */
.post-card p {
  color: #374151;
  line-height: 1.6;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 10px 16px;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  border-radius: 8px;
  font-weight: 500;
  margin-top: 12px;
  cursor: pointer;
  border: none;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
}
input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  margin-right: 8px;
}
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}
button:hover {
  transform: scale(1.05);
  transition: 0.2s;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #111827;
  color: white;
  
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(to right, #2563eb, #1e3a8a);
  color: white;
}

.hero h1 {
  margin-bottom: 10px;
}

/* CONTAINER */
.container {
  padding: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
}

/* POST CARD */
.post-card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.post-card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.post-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* CONTENT */
.post-content {
  padding: 15px;
}

.post-content h2 {
  margin: 0;
  font-size: 20px;
}

.post-content p {
  color: gray;
  font-size: 14px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
#themeToggle {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.dark {
  background: #111827;
  color: white;
}

.dark .post-card {
  background: #1f2937;
}

.dark .navbar {
  background: #020617;
}
  </style>
</head>

<body>
  <header class="navbar">
  <div class="logo">📝 MyBlog</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="#">Trending</a>
    <a href="#">About</a>
  </div>
 <button id="themeToggle">🌙</button> 
</header>

<section class="hero">
  <h1>Explore the Future of Technology 🚀</h1>
  <p>Read amazing blogs on AI, Innovation, and Modern Tech</p>
</section>

<div class="container">
  <div id="posts" class="grid"></div>
</div>

<header>📝 My Blog</header>

<div class="container" id="posts"></div>

<script>
const API = "https://blog-project-3uyk.onrender.com";

// Load posts
fetch(API + "/posts")
.then(res => res.json())
 .then(data => {
  const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach((post, index) => {
      const div = document.createElement("div");
      div.className = "post-card fade-in";
      div.style.animationDelay = index * 0.1 + "s";

 div.innerHTML = `
  ${post.image ? `<img src="${post.image}">` : ""}

  <div class="post-content">
    <h2>${post.title}</h2>

    <p style="font-size:12px;color:gray;">
      ${post.createdAt ? new Date(post.createdAt).toDateString() : ""}
    </p>

    <p>${post.content.substring(0, 120)}...</p>

    <span class="btn" onclick="openPost('${post._id}')">
      Read More →
    </span>
    <br><br>

<button onclick="likePost('${post._id}')"
  style="padding:6px 12px;border:none;border-radius:6px;background:#e5e7eb;">
  👍 ${post.likes || 0}
</button>

<br><br>

<strong style="display:block;margin-top:10px;">💬 Comments</strong>

<div>
  ${(post.comments || []).slice(0, 2).map(c => `
    <div style="
      background:#f1f5f9;
      padding:8px 12px;
      border-radius:10px;
      margin-top:6px;
      font-size:14px;
    ">
      💬 ${c.text}
    </div>
  `).join("")}
</div>

<div style="margin-top:10px;">
  <input id="comment-${post._id}" placeholder="Write a comment..."
    style="padding:8px;border-radius:6px;border:1px solid #ccc;width:65%;">
  
  <button onclick="addComment('${post._id}')"
    style="padding:8px 12px;background:#2563eb;color:white;border:none;border-radius:6px;">
    Post
  </button>
</div>
  </div>
`;  

      container.appendChild(div);
    });
  });

// Open post
function openPost(id) {
  window.location.href = "/post.html?id=" + id;
}

// Like
function likePost(id) { 
  fetch(API + `/posts/${id}/like`, { method: "POST" })
    .then(() => location.reload());
}

// Comment
function addComment(id) {
  const input = document.getElementById(`comment-${id}`);
  const text = input.value;

  fetch(API + `/posts/${id}/comment`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  })
  .then(() => location.reload());
}
</script>

<footer style="text-align:center;padding:20px;color:gray;">
  © 2026 My Blog | Built with ❤️ by preeti
</footer>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f8fafc;
  color: #1e293b;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #e2e8f0;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: #334155;
}

.nav-links a:hover {
  color: #2563eb;
}

/* SEARCH */
#search {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid #e2e8f0;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px;
  background: linear-gradient(to right, #2563eb, #4f46e5);
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
}

/* CARD */
.post-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.post-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* IMAGE */
.post-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* CONTENT */
.post-content {
  padding: 15px;
}

.post-content h2 {
  margin: 0;
}

.post-content p {
  font-size: 14px;
  color: gray;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #1e40af;
}

/* COMMENTS */
.comment {
  background: #f1f5f9;
  padding: 6px;
  margin-top: 5px;
  border-radius: 6px;
}

/* INPUT */
input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* ANIMATION */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.5s forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* DARK MODE */
body.dark {
  background: #0f172a;
  color: white;
}

body.dark .navbar {
  background: #020617;
}

body.dark .post-card {
  background: #1e293b;
}
  </style>
</head>

<body>
  <header class="navbar">
  <div class="logo">📝 MyBlog</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="#">Trending</a>
    <a href="#">About</a>
  </div>
 <input id="search" placeholder="Search blogs...">
 <button id="themeToggle">🌙</button> 
</header>

<section class="hero">
  <h1>Explore the Future of Technology 🚀</h1>
  <p>Read amazing blogs on AI, Innovation, and Modern Tech</p>
</section>

<div class="container">
  <div id="posts" class="grid"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const toggleBtn = document.getElementById("themeToggle");

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    toggleBtn.innerText = "☀️";
  }

  toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
      localStorage.setItem("theme", "dark");
      toggleBtn.innerText = "☀️";
    } else {
      localStorage.setItem("theme", "light");
      toggleBtn.innerText = "🌙";
    }
  });
});


</script>
<script>
const API = "https://blog-project-3uyk.onrender.com";
document.addEventListener("DOMContentLoaded", () => {
  const search = document.getElementById("search");

  if (search) {
    search.addEventListener("input", function(e) {
      const value = e.target.value.toLowerCase();

      document.querySelectorAll(".post-card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(value)
          ? "block"
          : "none";
      });
    });
  }
});
// Load posts
fetch(API + "/posts")
.then(res => res.json())
 .then(data => {
  const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach((post, index) => {
      const div = document.createElement("div");
      div.className = "post-card fade-in";
      div.style.animationDelay = index * 0.1 + "s";

 div.innerHTML = `
  ${post.image ? `<img src="${post.image}">` : ""}

  <div class="post-content">
    <h2>${post.title}</h2>

    <p style="font-size:12px;color:gray;">
      ${post.createdAt ? new Date(post.createdAt).toDateString() : ""}
    </p>

    <p>${post.content.substring(0, 120)}...</p>

    <span class="btn" onclick="openPost('${post._id}')">
      Read More →
    </span>
    <br><br>

<button onclick="likePost('${post._id}')"
  style="padding:6px 12px;border:none;border-radius:6px;background:#e5e7eb;">
  👍 ${post.likes || 0}
</button>

<br><br>

<strong style="display:block;margin-top:10px;">💬 Comments</strong>

<div>
  ${(post.comments || []).slice(0, 2).map(c => `
    <div style="
      background:#f1f5f9;
      padding:8px 12px;
      border-radius:10px;
      margin-top:6px;
      font-size:14px;
    ">
      💬 ${c.text}
    </div>
  `).join("")}
</div>

<div style="margin-top:10px;">
  <input id="comment-${post._id}" placeholder="Write a comment..."
    style="padding:8px;border-radius:6px;border:1px solid #ccc;width:65%;">
  
  <button onclick="addComment('${post._id}')"
    style="padding:8px 12px;background:#2563eb;color:white;border:none;border-radius:6px;">
    Post
  </button>
</div>
  </div>
`;  

      container.appendChild(div);
    });
  });

// Open post
function openPost(id) {
  window.location.href = "/post.html?id=" + id;
}

// Like
function likePost(id) { 
  fetch(API + `/posts/${id}/like`, { method: "POST" })
    .then(() => location.reload());
}

// Comment
function addComment(id) {
  const input = document.getElementById(`comment-${id}`);
  const text = input.value;

  fetch(API + `/posts/${id}/comment`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  })
  .then(() => location.reload());
}
</script>

<footer style="text-align:center;padding:20px;color:gray;">
  © 2026 My Blog | Built with ❤️ by preeti
</footer>

</body>
</html>
